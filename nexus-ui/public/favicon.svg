<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <title>Nexus</title>
  <!-- The letter N drawn as a network graph: the hub node (the orchestrator)
       sits at the crossing point; the emerald node is a healthy sub-agent. -->
  <line x1="18" y1="48" x2="18" y2="16" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="16" x2="46" y2="48" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  <line x1="46" y1="48" x2="46" y2="16" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  <circle cx="18" cy="16" r="6" fill="#6366f1"/>
  <circle cx="18" cy="48" r="6" fill="#818cf8"/>
  <circle cx="46" cy="16" r="6" fill="#818cf8"/>
  <circle cx="46" cy="48" r="6" fill="#10b981"/>
  <circle cx="32" cy="32" r="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
</svg>
