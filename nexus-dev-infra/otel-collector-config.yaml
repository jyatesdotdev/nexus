receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4319"
        cors:
          allowed_origins:
            - "http://localhost:5173"
            - "http://localhost:80"

processors:
  # EDUCATIONAL NOTE: Resource Processor
  # [Why] We use this processor to conditionally force the 'service.name' attribute to 'nexus-ui'.
  # This resolves a known issue where browser-based OpenTelemetry JS SDKs sometimes
  # fail to propagate the configured resource name due to NPM package version mismatches,
  # resulting in 'unknown_service' in the telemetry backends.
  # We use the transform processor so we only touch 'unknown_service'.
  transform/ui:
    trace_statements:
      - context: resource
        statements:
          - set(attributes["service.name"], "nexus-ui") where attributes["service.name"] == "unknown_service"

exporters:
  debug:
    verbosity: detailed
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true
  otlphttp/prometheus:
    endpoint: "http://prometheus:9090/api/v1/otlp"
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [transform/ui]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [transform/ui]
      exporters: [otlphttp/prometheus, debug]
