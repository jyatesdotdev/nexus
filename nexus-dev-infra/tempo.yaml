# EDUCATIONAL NOTE: Grafana Tempo Configuration
# [Why] Tempo is used as the high-performance tracing backend. This configuration
# enables 'Single Binary' mode, using local storage for trace blocks and 
# 'memberlist' for internal component coordination.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
          cors:
            allowed_origins:
              - "*"
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m
  lifecycler:
    ring:
      replication_factor: 1
      kvstore:
        store: memberlist

compactor:
  compaction:
    block_retention: 1h

metrics_generator:
  registry:
    external_labels:
      source: tempo
  # EDUCATIONAL NOTE: [Why] The 'local-blocks' processor requires a dedicated
  # traces storage path to index recently received spans for TraceQL metrics.
  traces_storage:
    path: /tmp/tempo/generator/traces
  storage:
    path: /tmp/tempo/generator/wal
  processor:
    service_graphs: {}
    span_metrics: {}
    local_blocks: {}

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

querier:
  max_concurrent_queries: 10

# EDUCATIONAL NOTE: Internal Service Discovery
# [Why] memberlist is used to coordinate internal components. 
# Explicitly defining it ensures that the metrics_generator and ingester 
# rings are correctly populated, resolving 'empty ring' errors.
memberlist:
  abort_if_cluster_join_fails: false
  bind_port: 7946

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]
