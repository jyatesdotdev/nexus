# EDUCATIONAL NOTE: This rule intentionally matches the FIRST CHARACTER of any
# file whose full text (DOTALL lookahead) lacks the marker. An earlier version
# matched the zero-width '\A' and filtered with pattern-not-regex — but
# zero-width-match handling differs across semgrep versions (older releases
# dropped empty matches entirely, so the rule silently checked nothing), and
# the not-regex only suppressed matches OVERLAPPING position 0. Anchoring the
# lookahead over the whole file and consuming one real character is stable
# across engines.
rules:
  - id: nexus-missing-educational-note
    patterns:
      - pattern-regex: '(?s)\A(?!.*EDUCATIONAL NOTE:).'
    message: "Nexus Standard Violation: Every architectural file must contain an '# EDUCATIONAL NOTE:' explaining the 'Why' behind the implementation."
    languages: [python, ts, js, dockerfile, yaml]
    severity: ERROR
    paths:
      include:
        - "**/nexus-orchestrator/**"
        - "**/nexus-mcp/**"
        - "**/nexus-a2a/**"
        - "**/nexus-ui/**"
        - "**/nexus-integration/**"
        - "**/nexus-stack/**"
      exclude:
        - "**/node_modules/**"
        - "**/venv/**"
        - "**/.venv/**"
        - "**/dist/**"
        - "**/build/**"
        - "**/tests/**"
        - "**/e2e_tests/**"
        - "**/e2e/**"
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.spec.ts"
        - "**/setupTests.ts"
        - "**/.git/**"
        - "CHANGELOG.md"
        - "TODO.md"
        - "package-lock.json"
        - "yarn.lock"

  - id: nexus-test-isolation-violation
    patterns:
      - pattern-either:
          - pattern-regex: 'https://api\.google\.com/.*'
          - pattern-regex: 'https://api\.open-meteo\.com/.*'
    message: "Nexus Standard Violation: Tests must be isolated. Do not call live external APIs. Use mocking instead."
    languages: [python, ts, js]
    severity: ERROR
    paths:
      include:
        - "nexus-orchestrator/**/test_*.py"
        - "nexus-orchestrator/**/*test.py"
        - "nexus-ui/**/*.test.ts"
        - "nexus-ui/**/*.spec.ts"
        - "nexus-integration/**"
      exclude:
        - "**/node_modules/**"
        - "**/venv/**"
        - "**/.venv/**"
